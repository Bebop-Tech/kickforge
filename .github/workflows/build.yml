name: Build

on:
  push:
  pull_request:

env:
  PLUGINVAL_STRICTNESS: 10

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pluginval_url: https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
            pluginval_bin: ./pluginval
          - os: windows-latest
            pluginval_url: https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip
            pluginval_bin: ./pluginval.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxinerama-dev \
            libgl1-mesa-dev xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Download pluginval
        shell: bash
        run: |
          curl -fsSL -o pluginval.zip "${{ matrix.pluginval_url }}"
          unzip -o pluginval.zip

      - name: Validate VST3 (pluginval)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            RUNNER="xvfb-run -a"
          else
            RUNNER=""
          fi
          $RUNNER ${{ matrix.pluginval_bin }} --strictness-level $PLUGINVAL_STRICTNESS \
            --verbose --validate "build/KickForge_artefacts/Release/VST3/KickForge.vst3"

      - name: Package Windows test bundle
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bundle
          cp -r "build/KickForge_artefacts/Release/VST3/KickForge.vst3" bundle/
          cp "build/KickForge_artefacts/Release/Standalone/KickForge.exe" bundle/
          cp packaging/LISEZMOI-TEST.txt bundle/

      - name: Upload Windows bundle artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: KickForge-windows
          path: bundle
